<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#10039; Your Journey Awaits &#10039;</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="cloud-layer">
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-1">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-3">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-5">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-7">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-8">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
      <a href="https://pin.it/5LPIP3CxS" target="_blank" rel="noopener noreferrer" class="landing-cloud cloud-6">
        <img src="/images/assets/cloud.png" alt="" />
      </a>
    </div>

    <script src="components.js"></script>

    <section class="landing">
      <header class="app-header">
        <div class="header-content">
          <div class="header-brand">
            <div class="header-title-block">
              <h1>
                You Don't See with Your Eye, You Perceive With Your Mind...
              </h1>
            </div>
          </div>
        </div>
      </header>

      <div class="landing-image-wrapper">
        <img
          src="/images/assets/moshPit.gif"
          class="landing-gif"
          alt="Human Experience"
        />
        <div class="powder-room">
          <div class="powder-mask powder-mask-left">
            <img
              src="/images/assets/leftDoor.png"
              class="powder-left"
              alt="leftCurtain"
            />
          </div>
          <div class="powder-mask powder-mask-right">
            <img
              src="/images/assets/rightDoor.png"
              class="powder-right"
              alt="rightCurtain"
            />
          </div>
        </div>
        <div class="curtain-mask">
          <img
            src="/images/assets/curtains.jpg"
            class="landing-curtain"
            alt="curtains"
          />
        </div>
        <div class="theater-container">
          <img
            src="/images/assets/theater.png"
            class="landing-image"
            alt="Theater entrance"
          />
          <a href="https://pin.it/6SrB2cDdu" target="_blank" rel="noopener noreferrer" class="landing-pin">
            <img src="/images/assets/pinterestLogo.png" alt="Pinterest" />
          </a>
        </div>
      </div>
    </section>

    <section class="reading-section">
      <form id="reading-form">
        <h2 class="form-heading">What's on your mind?</h2>
        <div class="form-input-wrapper">
          <span class="form-search-icon">&#128269;</span>
          <input
            type="text"
            id="question"
            placeholder="Love, career, or something else?"
          />
        </div>
        <div class="form-select-wrapper">
          <label for="spread" class="form-select-label">Spreads</label>
          <select id="spread">
            <option value="single">Single Card</option>
            <option value="threeCard" selected>Past/Present/Future</option>
            <option value="celticCross">Celtic Cross</option>
          </select>
        </div>
        <button type="submit">Draw Cards</button>
      </form>

      <section id="results">
        <div id="cards"></div>
        <div id="spread-area"></div>
        <div id="reading"></div>
      </section>
    </section>

    <script src="app.js"></script>
  </body>
</html>
