<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/California sun.woff2" as="font" type="font/woff2" crossorigin />
    <title>Velvet Tarot</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- SVG filter for wet-ground ink-bleed effect -->
    <svg style="position: absolute; width: 0; height: 0" aria-hidden="true">
      <defs>
        <!-- Fine capillary distortion — high-frequency noise for fiber-wicking edges -->
        <filter
          id="ink-bleed"
          x="-20%"
          y="-20%"
          width="140%"
          height="140%"
          color-interpolation-filters="sRGB"
        >
          <!-- Coarse warp for overall organic shape -->
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.008 0.014"
            numOctaves="4"
            seed="7"
            result="coarse"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="coarse"
            scale="40"
            xChannelSelector="R"
            yChannelSelector="G"
            result="warped"
          />
          <!-- Fine noise for capillary fringe along edges -->
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.04 0.06"
            numOctaves="3"
            seed="13"
            result="fine"
          />
          <feDisplacementMap
            in="warped"
            in2="fine"
            scale="14"
            xChannelSelector="G"
            yChannelSelector="R"
          />
        </filter>
      </defs>
    </svg>

    <!-- Foreground rain canvas — soft-focus drops for depth -->
    <canvas id="rain-canvas"></canvas>

    <div class="cloud-layer intro-hidden">
      <div class="landing-cloud cloud-1">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
      <div class="landing-cloud cloud-3">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
      <div class="landing-cloud cloud-5">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
      <div class="landing-cloud cloud-7">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
      <div class="landing-cloud cloud-8">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
      <div class="landing-cloud cloud-6">
        <img src="/images/assets/cloud.png" alt="" />
      </div>
    </div>

    <script src="components.js"></script>

    <section class="landing">
      <header class="app-header">
        <div class="header-content">
          <div class="header-brand">
            <h1>Velvet Tarot</h1>
          </div>
        </div>
      </header>

      <div class="landing-image-wrapper intro-hidden">
        <img
          src="/images/assets/moshPit.gif"
          class="landing-gif"
          alt="Human Experience"
        />
        <div class="powder-room">
          <div class="powder-mask powder-mask-left">
            <img
              src="/images/assets/leftDoor.png"
              class="powder-left"
              alt="leftCurtain"
            />
          </div>
          <div class="powder-mask powder-mask-right">
            <img
              src="/images/assets/rightDoor.png"
              class="powder-right"
              alt="rightCurtain"
            />
          </div>
        </div>
        <div class="curtain-mask">
          <img
            src="/images/assets/curtains.jpg"
            class="landing-curtain"
            alt="curtains"
          />
        </div>
        <div class="theater-container">
          <img
            src="/images/assets/theater.png"
            class="landing-image"
            alt="Theater entrance"
          />
          <a
            href="https://pin.it/6SrB2cDdu"
            target="_blank"
            rel="noopener noreferrer"
            class="landing-pin"
          >
            <img src="/images/assets/pinterestLogo.png" alt="Pinterest" />
          </a>
        </div>
      </div>
    </section>

    <div class="click-prompt" id="click-prompt">click here to begin</div>
    <button class="skip-intro" aria-label="Skip intro">skip →</button>

    <script src="app.js"></script>
  </body>
</html>
