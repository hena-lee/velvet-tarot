<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/California sun.woff2" as="font" type="font/woff2" crossorigin />
    <title>Velvet Tarot</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      html, body { overflow: hidden; height: 100vh; }
      html { scrollbar-width: none; background-color: #000; }
      html::-webkit-scrollbar { display: none; }
      body { max-width: 100%; padding: 0; }
    </style>

  <body class="reading-page">
    <div class="entry-cover" id="entry-cover" style="position:fixed;inset:0;background:#000;z-index:99999;transition:opacity 1.2s ease;pointer-events:none;"></div>
    <script src="components.js"></script>

    <main class="reading-stage results-visible">
      <div id="reading"></div>
    </main>

    <script src="/lib/db.js"></script>
    <script src="reading.js"></script>
  </body>
</html>
