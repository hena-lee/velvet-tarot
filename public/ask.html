<!doctype html>
<html lang="en" class="dark-start">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#10039; Ask the Cards &#10039;</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Start page black to prevent rose-bg flash before cover renders */
      html.dark-start {
        background: #000 !important;
      }

      /* Register custom properties for eye-spotlight animation */
      @property --spot-w {
        syntax: "<percentage>";
        initial-value: 0%;
        inherits: false;
      }
      @property --spot-h {
        syntax: "<percentage>";
        initial-value: 0%;
        inherits: false;
      }

      /* Entry overlay: starts as black, two eye-shaped spotlights blink then open */
      .entry-cover {
        position: fixed;
        inset: 0;
        z-index: 99999;
        pointer-events: none;
        background: #000;
        --spot-w: 0%;
        --spot-h: 0%;
        mask-image:
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 40% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          ),
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 60% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          );
        -webkit-mask-image:
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 40% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          ),
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 60% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          );
        mask-composite: intersect;
        -webkit-mask-composite: source-in;
        transition: none;
      }

      .entry-cover.spotlight-blink {
        animation: eyeOpen 3.6s ease-in-out forwards;
      }

      @keyframes eyeOpen {
        0% {
          --spot-w: 0%;
          --spot-h: 0%;
        }
        8% {
          --spot-w: 8%;
          --spot-h: 0.8%;
        }
        18% {
          --spot-w: 8%;
          --spot-h: 3%;
        }
        26% {
          --spot-w: 8%;
          --spot-h: 6%;
        }
        34% {
          --spot-w: 8%;
          --spot-h: 6%;
        }
        39% {
          --spot-w: 8%;
          --spot-h: 0.3%;
        }
        46% {
          --spot-w: 8%;
          --spot-h: 6%;
        }
        58% {
          --spot-w: 8%;
          --spot-h: 6%;
        }
        63% {
          --spot-w: 8%;
          --spot-h: 0.3%;
        }
        72% {
          --spot-w: 8%;
          --spot-h: 7%;
        }
        100% {
          --spot-w: 8%;
          --spot-h: 7%;
        }
      }

      @keyframes eyeReveal {
        0% {
          --spot-w: 8%;
          --spot-h: 7%;
        }
        100% {
          --spot-w: 100%;
          --spot-h: 100%;
        }
      }

      .entry-cover.spotlight-open {
        animation: eyeReveal 2s ease-in-out forwards;
      }

      /* Vision text — centered behind the card, revealed during dissolution */
      .reveal-text {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.6em;
        font-family: "California Sun", "Jacquard 24", Georgia, serif;
        font-size: clamp(1rem, 2vw, 1.6rem);
        color: rgb(38, 10, 10);
        letter-spacing: 0.08em;
        text-align: center;
        z-index: 2;
        pointer-events: none;
        padding: 2rem;
        line-height: 1.6;
      }
      .reveal-text .r-char {
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      .reveal-text .r-char.visible {
        opacity: 1;
      }

      /* Dissolution mask — diagonal wipe from bottom-left to top-right */
      @property --dissolve {
        syntax: "<number>";
        initial-value: 0;
        inherits: false;
      }
      .reading-form-frame.dissolving {
        --dissolve: 0;
        -webkit-mask-image: linear-gradient(
          to top right,
          transparent 0%,
          transparent calc(var(--dissolve) * 100% - 4%),
          rgba(0, 0, 0, 0.3) calc(var(--dissolve) * 100% - 2%),
          black calc(var(--dissolve) * 100%)
        );
        mask-image: linear-gradient(
          to top right,
          transparent 0%,
          transparent calc(var(--dissolve) * 100% - 4%),
          rgba(0, 0, 0, 0.3) calc(var(--dissolve) * 100% - 2%),
          black calc(var(--dissolve) * 100%)
        );
      }

      /* Manicule wobble+glow when user is typing */
      @keyframes maniculeWobble {
        0%,
        100% {
          transform: rotate(0deg);
          filter: drop-shadow(0 0 0px transparent);
        }
        25% {
          transform: rotate(-6deg);
        }
        50% {
          transform: rotate(4deg);
          filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
        }
        75% {
          transform: rotate(-3deg);
        }
      }
      .manicule.typing {
        animation: maniculeWobble 0.6s ease-in-out infinite;
      }
      @keyframes buttonWobble {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        25% {
          transform: translate(-50%, -50%) rotate(-3deg) scale(1.03);
        }
        50% {
          transform: translate(-50%, -50%) rotate(2deg) scale(0.97);
        }
        75% {
          transform: translate(-50%, -50%) rotate(-1.5deg) scale(1.01);
        }
      }
      .readingform-button.typing {
        animation: buttonWobble 0.6s ease-in-out infinite;
      }

      /* Page fade-out before navigation */
      .page-fade-out {
        position: fixed;
        inset: 0;
        z-index: 99998;
        background: var(--rose-bg, #996070);
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.2s ease-in;
      }
      .page-fade-out.active {
        opacity: 1;
      }

      /* Glitter canvas overlays the form area */
      .glitter-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div class="entry-cover" id="entry-cover"></div>

    <script src="components.js"></script>

    <img
      src="/images/assets/piercing.png"
      class="piercing-img piercing-right"
      alt=""
    />
    <section class="reading-section">
      <div class="readingform-wrap">
        <div class="reveal-text" id="reveal-text"></div>
        <img
          src="/images/assets/readingform.png"
          class="readingform-img"
          alt=""
        />
        <img
          src="/images/assets/button.png"
          class="readingform-button"
          alt=""
        />
        <div class="lace-frame reading-form-frame" id="reading-form-wrap">
          <form id="reading-form">
            <div class="form-input-row">
              <input
                type="text"
                id="question"
                placeholder="Whisper your query to the cards..."
                autocomplete="off"
              />
              <button
                type="submit"
                class="form-arrow-btn"
                aria-label="Draw cards"
              >
                <img
                  src="/images/assets/manicule.png"
                  class="manicule"
                  alt="☞"
                />
              </button>
            </div>
            <div
              class="spread-pills"
              id="spread-pills"
              role="group"
              aria-label="Spread type"
            >
              <button type="button" class="spread-pill" data-value="single">
                single card
              </button>
              <button
                type="button"
                class="spread-pill active"
                data-value="threeCard"
              >
                past · present · future
              </button>
              <button
                type="button"
                class="spread-pill"
                data-value="celticCross"
              >
                celtic cross
              </button>
            </div>
            <input type="hidden" id="spread" value="threeCard" />
          </form>
        </div>
      </div>
    </section>

    <script>
      // --- Prepare reveal text (hidden behind the card) ---
      const revealTextEl = document.getElementById("reveal-text");
      const revealLines = [
        "You don\u2019t see with your eye,",
        "You perceive with your mind.",
      ];
      revealTextEl.innerHTML = revealLines
        .map((line) => {
          const chars = line
            .split("")
            .map((ch) =>
              ch === " " ? " " : `<span class="r-char">${ch}</span>`,
            )
            .join("");
          return `<span class="reveal-line">${chars}</span>`;
        })
        .join("");

      function startRevealText() {
        const chars = revealTextEl.querySelectorAll(".r-char");
        chars.forEach((span, i) => {
          setTimeout(() => span.classList.add("visible"), i * 50);
        });
      }

      // Two-spotlight reveal: darkness → blink → open
      // ?skip bypasses the eye animation entirely
      requestAnimationFrame(() => {
        const cover = document.getElementById("entry-cover");
        if (!cover) return;
        if (new URLSearchParams(window.location.search).has("skip")) {
          document.documentElement.classList.remove("dark-start");
          cover.remove();
          return;
        }
        // Preload blink audio via Web Audio API for reliable playback
        const blinkCtx = new (window.AudioContext || window.webkitAudioContext)();
        let blinkBuffer = null;
        fetch("/audio/blink.mp3")
          .then(r => r.arrayBuffer())
          .then(buf => blinkCtx.decodeAudioData(buf))
          .then(decoded => { blinkBuffer = decoded; })
          .catch(() => {});
        // Unlock audio context on any user gesture (covers refresh scenario)
        const unlockBlink = () => {
          if (blinkCtx.state === "suspended") blinkCtx.resume();
        };
        ["click", "touchstart", "pointerdown", "keydown"].forEach(evt =>
          window.addEventListener(evt, unlockBlink, { once: false, passive: true })
        );
        // Also try resuming immediately (works when gesture carries from landing page)
        unlockBlink();

        setTimeout(() => {
          cover.classList.add("spotlight-blink");
          // Play blink sound when eyes close (at 39% and 63% of 3.6s animation)
          const blinkSnd = () => {
            if (!blinkBuffer || blinkCtx.state === "closed") return;
            if (blinkCtx.state === "suspended") blinkCtx.resume();
            const source = blinkCtx.createBufferSource();
            const gain = blinkCtx.createGain();
            source.buffer = blinkBuffer;
            gain.gain.value = 0.25;
            // Fade out the last 40% of the sound
            const fadeStart = blinkBuffer.duration * 0.6;
            gain.gain.setValueAtTime(0.25, blinkCtx.currentTime + fadeStart);
            gain.gain.linearRampToValueAtTime(0, blinkCtx.currentTime + blinkBuffer.duration);
            source.connect(gain).connect(blinkCtx.destination);
            source.start(0);
          };
          setTimeout(blinkSnd, 3600 * 0.39);
          setTimeout(blinkSnd, 3600 * 0.63);
          cover.addEventListener("animationend", function onBlink() {
            cover.removeEventListener("animationend", onBlink);
            cover.classList.remove("spotlight-blink");
            document.documentElement.classList.remove("dark-start");
            void cover.offsetWidth;
            cover.classList.add("spotlight-open");
            cover.addEventListener("animationend", () => cover.remove(), {
              once: true,
            });
          });
        }, 800);
      });

      // --- Manicule wobble on typing ---
      const questionInput = document.getElementById("question");
      const manicule = document.querySelector(".manicule");
      const redButton = document.querySelector(".readingform-button");
      let typingTimer = null;
      questionInput.addEventListener("input", () => {
        if (manicule) manicule.classList.add("typing");
        if (redButton) redButton.classList.add("typing");
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
          if (manicule) manicule.classList.remove("typing");
          if (redButton) redButton.classList.remove("typing");
        }, 150);
      });

      // --- Click sound ---
      function playClick() {
        const audio = new Audio("/audio/click.mp3");
        audio.volume = 0.5;
        audio.play().catch(() => {});
      }

      // --- Spread tag selection ---
      document.querySelectorAll(".spread-pill").forEach((pill) => {
        pill.addEventListener("click", () => {
          playClick();
          document
            .querySelectorAll(".spread-pill")
            .forEach((p) => p.classList.remove("active"));
          pill.classList.add("active");
          document.getElementById("spread").value = pill.dataset.value;
        });
      });

      // --- Dissolution + glitter effect ---
      function startDissolution(card, url) {
        // Disable form interaction
        card.style.pointerEvents = "none";

        // Start char-by-char text reveal behind the dissolving card
        startRevealText();

        // Create glitter canvas
        const wrap = card.closest(".readingform-wrap");
        const canvas = document.createElement("canvas");
        canvas.className = "glitter-canvas";
        const rect = wrap.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        wrap.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        const particles = [];
        const colors = ["#eee8d8", "#ddd8cc", "#c8c3b8", "#e8e4dc", "#d4d0c8"];

        function spawnParticles(progress) {
          // Spawn along the diagonal dissolution edge
          for (let i = 0; i < 6; i++) {
            // The edge line: normalized (x + (1-y)) = progress * 1.4
            const t = Math.random();
            const nx = t * Math.min(progress * 1.4, 1);
            const ny = 1 - (progress * 1.4 - nx);
            const px = nx * canvas.width;
            const py = ny * canvas.height;
            if (py < 0 || py > canvas.height || px < 0 || px > canvas.width)
              continue;
            particles.push({
              x: px + (Math.random() - 0.5) * 20,
              y: py + (Math.random() - 0.5) * 20,
              vx: 0.5 + Math.random() * 1.5,
              vy: -(0.5 + Math.random() * 1.5),
              size: 1 + Math.random() * 3,
              color: colors[Math.floor(Math.random() * colors.length)],
              life: 1,
              decay: 0.02 + Math.random() * 0.025,
              spin: Math.random() * Math.PI * 2,
            });
          }
        }

        function drawParticles() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy -= 0.01; // slight upward drift
            p.life -= p.decay;
            p.spin += 0.05;
            if (p.life <= 0) {
              particles.splice(i, 1);
              continue;
            }
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.spin);
            ctx.fillStyle = p.color;
            ctx.fillRect(
              -p.size / 2,
              -p.size / 2,
              p.size,
              p.size * (0.6 + Math.random() * 0.4),
            );
            ctx.restore();
          }
        }

        // Submit question audio — plays during dissolution, fades during page exit
        const submitAudio = new Audio("/audio/submitquestion.mp3");
        submitAudio.volume = 0.5;
        submitAudio.play().catch(() => {});

        // Animate dissolution
        card.classList.add("dissolving");
        const duration = 1800;
        const start = performance.now();
        let animId;
        let dissolutionDone = false;
        let navigateScheduled = false;

        function tick(now) {
          const elapsed = now - start;

          if (!dissolutionDone) {
            const progress = Math.min(elapsed / duration, 1.5);
            card.style.setProperty("--dissolve", progress);
            spawnParticles(progress);
            if (elapsed >= duration + 400) dissolutionDone = true;
          }

          drawParticles();

          if (dissolutionDone && particles.length === 0) {
            // All particles faded — wait for text to be read, then navigate
            if (!navigateScheduled) {
              navigateScheduled = true;
              setTimeout(() => {
                // Fade the whole page out before navigating
                const fadeOut = document.createElement("div");
                fadeOut.className = "page-fade-out";
                document.body.appendChild(fadeOut);
                requestAnimationFrame(() => {
                  requestAnimationFrame(() => fadeOut.classList.add("active"));
                });
                // Fade out audio over the 1.2s page transition
                const fadeSteps = 24;
                const fadeInterval = 1200 / fadeSteps;
                const volStep = submitAudio.volume / fadeSteps;
                const audioFade = setInterval(() => {
                  submitAudio.volume = Math.max(0, submitAudio.volume - volStep);
                  if (submitAudio.volume <= 0) {
                    clearInterval(audioFade);
                    submitAudio.pause();
                  }
                }, fadeInterval);
                fadeOut.addEventListener("transitionend", () => {
                  window.location.href = url;
                });
              }, 1500);
            }
            return;
          }

          animId = requestAnimationFrame(tick);
        }
        animId = requestAnimationFrame(tick);
      }

      // --- Breathing card parallax tilt ---
      const formCard = document.getElementById("reading-form-wrap");
      const formWrap = document.querySelector(".readingform-wrap");
      const formImg = document.querySelector(".readingform-img");
      if (formCard && formWrap) {
        formWrap.addEventListener("mousemove", (e) => {
          if (formCard.classList.contains("dissolving")) return;
          const rect = formCard.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const nx = (e.clientX - cx) / (rect.width / 2);
          const ny = (e.clientY - cy) / (rect.height / 2);
          const maxTilt = 3;
          const ry = nx * maxTilt;
          const rx = -ny * maxTilt;
          formCard.style.transform = `translateX(1%) rotateX(${rx}deg) rotateY(${ry}deg)`;
          if (formImg) {
            formImg.style.transform = `translate(-50%, -50%) scale(0.7) rotateX(${rx * 0.2}deg) rotateY(${ry * 0.2}deg)`;
          }
        });
        formWrap.addEventListener("mouseleave", () => {
          if (formCard.classList.contains("dissolving")) return;
          formCard.style.transform = "translateX(1%)";
          if (formImg) {
            formImg.style.transform = "translate(-50%, -50%) scale(0.7)";
          }
        });
      }

      // --- Form submission ---
      const form = document.getElementById("reading-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        playClick();
        const question = document.getElementById("question").value.trim();
        const spread = document.getElementById("spread").value;
        const params = new URLSearchParams({ spread });
        if (question) params.set("question", question);
        localStorage.setItem("velvet_visited", "1");
        const url = `/reading.html?${params}`;
        const card = document.getElementById("reading-form-wrap");
        startDissolution(card, url);
      });
    </script>
  </body>
</html>
