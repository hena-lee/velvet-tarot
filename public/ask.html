<!doctype html>
<html lang="en" class="dark-start">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#10039; Ask the Cards &#10039;</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Start page black to prevent rose-bg flash before cover renders */
      html.dark-start {
        background: #000 !important;
      }

      /* Register custom properties for eye-spotlight animation */
      @property --spot-w {
        syntax: "<percentage>";
        initial-value: 0%;
        inherits: false;
      }
      @property --spot-h {
        syntax: "<percentage>";
        initial-value: 0%;
        inherits: false;
      }

      /* Entry overlay: starts as black, two eye-shaped spotlights blink then open */
      .entry-cover {
        position: fixed;
        inset: 0;
        z-index: 99999;
        pointer-events: none;
        background: #000;
        --spot-w: 0%;
        --spot-h: 0%;
        mask-image:
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 40% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          ),
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 60% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          );
        -webkit-mask-image:
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 40% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          ),
          radial-gradient(
            ellipse var(--spot-w) var(--spot-h) at 60% 50%,
            transparent 0%,
            transparent 50%,
            black 100%
          );
        mask-composite: intersect;
        -webkit-mask-composite: source-in;
        transition: none;
      }

      .entry-cover.spotlight-blink {
        animation: eyeOpen 3.6s ease-in-out forwards;
      }

      @keyframes eyeOpen {
        0%   { --spot-w: 0%;  --spot-h: 0%; }
        8%   { --spot-w: 8%;  --spot-h: 0.8%; }
        18%  { --spot-w: 8%;  --spot-h: 3%; }
        26%  { --spot-w: 8%;  --spot-h: 6%; }
        34%  { --spot-w: 8%;  --spot-h: 6%; }
        39%  { --spot-w: 8%;  --spot-h: 0.3%; }
        46%  { --spot-w: 8%;  --spot-h: 6%; }
        58%  { --spot-w: 8%;  --spot-h: 6%; }
        63%  { --spot-w: 8%;  --spot-h: 0.3%; }
        72%  { --spot-w: 8%;  --spot-h: 7%; }
        100% { --spot-w: 8%;  --spot-h: 7%; }
      }

      @keyframes eyeReveal {
        0%   { --spot-w: 8%;   --spot-h: 7%; }
        100% { --spot-w: 100%; --spot-h: 100%; }
      }

      .entry-cover.spotlight-open {
        animation: eyeReveal 2s ease-in-out forwards;
      }

      /* Vision text — positioned above and below the reading form */
      .vision-text {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        font-family: "California Sun", "Jacquard 24", Georgia, serif;
        font-size: clamp(1.2rem, 2.5vw, 2rem);
        color: rgb(38, 10, 10);
        letter-spacing: 0.08em;
        text-align: center;
        z-index: 4;
        pointer-events: none;
        white-space: nowrap;
      }
      .vision-top {
        top: 12%;
      }
      .vision-bottom {
        bottom: 10%;
      }
      .vision-text .v-word,
      .vision-text .v-char {
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .vision-text .v-word.visible,
      .vision-text .v-char.visible {
        opacity: 1;
      }
      .vision-text.fade-out {
        transition: opacity 0.8s ease;
        opacity: 0;
      }

      /* Dissolution mask — diagonal wipe from bottom-left to top-right */
      @property --dissolve {
        syntax: "<number>";
        initial-value: 0;
        inherits: false;
      }
      .reading-form-frame.dissolving {
        --dissolve: 0;
        -webkit-mask-image: linear-gradient(
          to top right,
          transparent 0%,
          transparent calc(var(--dissolve) * 100% - 4%),
          rgba(0,0,0,0.3) calc(var(--dissolve) * 100% - 2%),
          black calc(var(--dissolve) * 100%)
        );
        mask-image: linear-gradient(
          to top right,
          transparent 0%,
          transparent calc(var(--dissolve) * 100% - 4%),
          rgba(0,0,0,0.3) calc(var(--dissolve) * 100% - 2%),
          black calc(var(--dissolve) * 100%)
        );
      }

      /* Glitter canvas overlays the form area */
      .glitter-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div class="entry-cover" id="entry-cover"></div>

    <script src="components.js"></script>

    <p class="vision-text vision-top" id="vision-top"></p>
    <p class="vision-text vision-bottom" id="vision-bottom"></p>

    <img src="/images/assets/piercing.png" class="piercing-img piercing-right" alt="" />
    <section class="reading-section">
      <div class="readingform-wrap">
        <img src="/images/assets/readingform.png" class="readingform-img" alt="" />
        <img src="/images/assets/button.png" class="readingform-button" alt="" />
        <div class="lace-frame reading-form-frame" id="reading-form-wrap">
          <form id="reading-form">
            <div class="form-input-row">
              <input
                type="text"
                id="question"
                placeholder="Whisper your query to the cards..."
                autocomplete="off"
              />
              <button
                type="submit"
                class="form-arrow-btn"
                aria-label="Draw cards"
              >
                <img
                  src="/images/assets/manicule.png"
                  class="manicule"
                  alt="☞"
                />
              </button>
            </div>
            <div
              class="spread-pills"
              id="spread-pills"
              role="group"
              aria-label="Spread type"
            >
              <button type="button" class="spread-pill" data-value="single">
                single card
              </button>
              <button
                type="button"
                class="spread-pill active"
                data-value="threeCard"
              >
                past · present · future
              </button>
              <button
                type="button"
                class="spread-pill"
                data-value="celticCross"
              >
                celtic cross
              </button>
            </div>
            <input type="hidden" id="spread" value="threeCard" />
          </form>
        </div>
      </div>
    </section>

    <script>
      // --- Vision text animation ---
      function startVisionSequence() {
        const topEl = document.getElementById("vision-top");
        const botEl = document.getElementById("vision-bottom");

        // Wrap words for top text
        const topWords = "You don't see with your eye".split(" ");
        topEl.innerHTML = topWords
          .map((w) => `<span class="v-word">${w}</span>`)
          .join(" ");

        // Wrap characters for bottom text
        const botText = "You perceive with your mind";
        botEl.innerHTML = botText
          .split("")
          .map((ch) =>
            ch === " "
              ? " "
              : `<span class="v-char">${ch}</span>`
          )
          .join("");

        // Phase 1: fade in top text word by word
        const wordSpans = topEl.querySelectorAll(".v-word");
        let delay = 300;
        wordSpans.forEach((span, i) => {
          setTimeout(() => span.classList.add("visible"), delay + i * 350);
        });

        // Phase 2: after top text is fully visible, fade it out then fade in bottom char by char
        const topDone = delay + wordSpans.length * 350 + 800;
        setTimeout(() => {
          topEl.classList.add("fade-out");
        }, topDone);

        const botStart = topDone + 900;
        const charSpans = botEl.querySelectorAll(".v-char");
        charSpans.forEach((span, i) => {
          setTimeout(() => span.classList.add("visible"), botStart + i * 60);
        });
      }

      // Two-spotlight reveal: darkness → blink → open
      // ?skip bypasses the eye animation entirely
      requestAnimationFrame(() => {
        const cover = document.getElementById("entry-cover");
        if (!cover) return;
        if (new URLSearchParams(window.location.search).has("skip")) {
          document.documentElement.classList.remove("dark-start");
          cover.remove();
          startVisionSequence();
          return;
        }
        setTimeout(() => {
          cover.classList.add("spotlight-blink");
          cover.addEventListener("animationend", function onBlink() {
            cover.removeEventListener("animationend", onBlink);
            cover.classList.remove("spotlight-blink");
            document.documentElement.classList.remove("dark-start");
            void cover.offsetWidth;
            cover.classList.add("spotlight-open");
            cover.addEventListener(
              "animationend",
              () => {
                cover.remove();
                startVisionSequence();
              },
              { once: true },
            );
          });
        }, 800);
      });

      // --- Spread tag selection ---
      document.querySelectorAll(".spread-pill").forEach((pill) => {
        pill.addEventListener("click", () => {
          document
            .querySelectorAll(".spread-pill")
            .forEach((p) => p.classList.remove("active"));
          pill.classList.add("active");
          document.getElementById("spread").value = pill.dataset.value;
        });
      });

      // --- Dissolution + glitter effect ---
      function startDissolution(card, url) {
        // Disable form interaction
        card.style.pointerEvents = "none";

        // Create glitter canvas
        const wrap = card.closest(".readingform-wrap");
        const canvas = document.createElement("canvas");
        canvas.className = "glitter-canvas";
        const rect = wrap.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        wrap.appendChild(canvas);
        const ctx = canvas.getContext("2d");

        const particles = [];
        const colors = ["#FFD700", "#7F00FF", "#6B1524", "#eee8d8"];

        function spawnParticles(progress) {
          // Spawn along the diagonal dissolution edge
          for (let i = 0; i < 6; i++) {
            // The edge line: normalized (x + (1-y)) = progress * 1.4
            const t = Math.random();
            const nx = t * Math.min(progress * 1.4, 1);
            const ny = 1 - (progress * 1.4 - nx);
            const px = nx * canvas.width;
            const py = ny * canvas.height;
            if (py < 0 || py > canvas.height || px < 0 || px > canvas.width) continue;
            particles.push({
              x: px + (Math.random() - 0.5) * 20,
              y: py + (Math.random() - 0.5) * 20,
              vx: 0.5 + Math.random() * 1.5,
              vy: -(0.5 + Math.random() * 1.5),
              size: 1 + Math.random() * 3,
              color: colors[Math.floor(Math.random() * colors.length)],
              life: 1,
              decay: 0.008 + Math.random() * 0.012,
              spin: Math.random() * Math.PI * 2,
            });
          }
        }

        function drawParticles() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy -= 0.01; // slight upward drift
            p.life -= p.decay;
            p.spin += 0.05;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.spin);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * (0.6 + Math.random() * 0.4));
            ctx.restore();
          }
        }

        // Animate dissolution
        card.classList.add("dissolving");
        const duration = 3000;
        const start = performance.now();
        let animId;

        function tick(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1.5); // overshoot to cover diagonal
          card.style.setProperty("--dissolve", progress);
          spawnParticles(progress);
          drawParticles();

          if (elapsed < duration + 800) {
            animId = requestAnimationFrame(tick);
          } else {
            // Navigate after dissolution completes
            window.location.href = url;
          }
        }
        animId = requestAnimationFrame(tick);
      }

      // --- Form submission ---
      const form = document.getElementById("reading-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const question = document.getElementById("question").value.trim();
        const spread = document.getElementById("spread").value;
        const params = new URLSearchParams({ spread });
        if (question) params.set("question", question);
        localStorage.setItem("velvet_visited", "1");
        const url = `/reading.html?${params}`;
        const card = document.getElementById("reading-form-wrap");
        startDissolution(card, url);
      });
    </script>
  </body>
</html>
