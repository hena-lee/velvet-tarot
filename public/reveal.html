<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/California sun.woff2" as="font" type="font/woff2" crossorigin />
    <title>Velvet Tarot</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Reading page overrides: scrollable, full-width body */
      html { overflow-y: auto; background-color: #9a616c; }
      body { max-width: 100%; padding: 0; }
    </style>
  </head>
  <body class="reading-page">
    <div class="entry-cover" id="entry-cover" style="position:fixed;inset:0;background:var(--rose-bg);z-index:99999;transition:opacity 0.8s ease;pointer-events:none;"></div>
    <script src="components.js"></script>
    <script>
      // Fade out entry cover for smooth transition from ask page
      requestAnimationFrame(() => {
        const cover = document.getElementById('entry-cover');
        if (cover) {
          cover.style.opacity = '0';
          cover.addEventListener('transitionend', () => cover.remove());
        }
      });
    </script>

    <main class="reading-stage">
      <p class="reading-status" id="reading-status"></p>
      <!-- Shuffle scene: hands flank the deck during shuffling -->
      <div class="shuffle-scene" id="shuffle-scene">
        <img src="/images/assets/leftHand.png" class="shuffle-hand hand-left" alt="" />
        <div id="cards"></div>
        <img src="/images/assets/rightHand.png" class="shuffle-hand hand-right" alt="" />
      </div>

      <div id="spread-area"></div>
      <div id="reading"></div>
    </main>

    <script src="/lib/db.js"></script>
    <script src="reveal.js"></script>
  </body>
</html>
